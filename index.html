<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <title>Document</title>
</head>

<body>
    <header class="header">
        <div class="top-banner">
            <p>Sign up and get 20% off to your first order. <strong><u>Sign Up Now</u></strong></p>
            <button>
                <img src="../web-2026-/images/Cross.svg" alt="Крестик">
            </button>
        </div>

        <div class="container">
            <div class="header-content">
                <span class="logo">SHOP.CO</span>

                <nav class="navigation">
                    <ul class="nav-list">
                        <li class="nav-item"><a href="#">Shop</a></li>
                        <li class="nav-item"><a href="#">On Sale</a></li>
                        <li class="nav-item"><a href="#">New Arrivals</a></li>
                        <li class="nav-item"><a href="#">Brands</a></li>
                    </ul>
                </nav>

                <form class="search" role="search">
                    <button type="submit" class="search btn">
                    <img src="../web-2026-/images/Loupe.svg" alt="Лупа" class="icon">
                    </button>
                    <input type="text" name="search" placeholder="Search for product" class="search-input">
                </form>

                <div class="icons">
                    <a href="#"><img src="../web-2026-/images/Cart.svg" alt="Корзина" class="icon"></a>
                    <a href="#"><img src="../web-2026-/images/Profile.svg" alt="Профиль" class="icon"></a>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
